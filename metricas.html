<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métricas | Rua do Outono</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: #333333;
        }
        h1, h2, .serif { font-family: 'Playfair Display', serif; }
        .accent-color { color: #b35a44; }
        
        /* Toast Notification Styles */
        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #b35a44;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(179, 90, 68, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(150%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        #toast.show { transform: translateX(0); }
        
        @keyframes pulse-new {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #22c55e; }
            100% { transform: scale(1); }
        }
        .pulse { animation: pulse-new 0.8s ease-out; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center p-6 gap-6">
    <!-- Toast Notification -->
    <div id="toast">
        <div class="bg-white/20 p-2 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
        </div>
        <div>
            <p class="text-xs opacity-80 font-semibold uppercase tracking-wider">Nova Visita!</p>
            <p class="text-sm font-medium">Alguém acabou de entrar no site 🍂</p>
        </div>
    </div>

    <div class="bg-white p-10 rounded-xl shadow-xl max-w-lg w-full text-center border border-gray-100">
        <p class="serif italic text-sm tracking-widest uppercase opacity-70 mb-8">Painel de Métricas</p>
        
        <div class="flex justify-between items-end mb-8 border-b border-gray-100 pb-8">
            <div class="text-left">
                <h2 class="text-lg font-light text-gray-500 mb-1">Total de Visitantes</h2>
                <div class="text-6xl font-bold accent-color serif transition-all duration-500" id="counter">...</div>
            </div>
            <div class="text-right">
                <h2 class="text-sm font-light text-gray-500 mb-1">Hoje</h2>
                <div class="text-3xl font-bold text-gray-800" id="counter-today">...</div>
            </div>
        </div>
        
        <div class="mb-8 relative h-48 w-full">
            <canvas id="dailyChart"></canvas>
        </div>
        
        <button onclick="carregarMetricas()" id="btn-atualizar" class="w-full bg-stone-100 text-stone-600 hover:bg-stone-200 py-3 rounded-md text-sm tracking-wide transition-all duration-300 flex justify-center items-center gap-2 mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Atualizar Agora
        </button>

        <button onclick="ativarNotificacoes()" id="btn-notificacao" class="w-full bg-stone-800 text-white hover:bg-black py-3 rounded-md text-sm tracking-wide transition-all duration-300 flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            Ativar Alertas Sonoros
        </button>

        <p class="text-[10px] opacity-40 mt-6" id="status-update">Monitoramento ativo em tempo real (15s)</p>
    </div>

    <script>
        let myChart = null;
        let ultimoTotal = null;
        let somAtivado = false;
        const audioNotificacao = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function ativarNotificacoes() {
            // Pede permissão para notificações nativas
            if ("Notification" in window) {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    console.log("Notificações autorizadas");
                }
            }
            
            // Ativa o áudio (browsers exigem clique do usuário)
            somAtivado = true;
            document.getElementById('btn-notificacao').innerText = '🔔 Alertas Sonoros Ativos';
            document.getElementById('btn-notificacao').classList.replace('bg-stone-800', 'bg-green-600');
            
            // Toca um som de teste
            audioNotificacao.play();
        }

        function showNotification() {
            // Notificação na Página (Toast)
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 5000);
            
            // Efeito visual no contador
            const counter = document.getElementById('counter');
            counter.classList.add('pulse');
            setTimeout(() => counter.classList.remove('pulse'), 1000);

            // Som
            if (somAtivado) {
                audioNotificacao.play();
            }

            // Notificação Nativa do Sistema
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("Rua do Outono 🍂", {
                    body: "Um novo visitante acabou de entrar no seu site!",
                    icon: "https://daianeborcathfotografia.com.br/favicon.ico"
                });
            }
        }

        async function carregarMetricas(isAuto = false) {
            const btn = document.getElementById('btn-atualizar');
            if(!isAuto) {
                btn.disabled = true;
                btn.style.opacity = '0.5';
            }
            
            try {
                // Fetch Total
                const resTotal = await fetch('https://abacus.jasoncameron.dev/get/daianeborcath/outono');
                const dataTotal = await resTotal.json();
                const novoTotal = dataTotal.value || 0;
                
                // Se o total aumentou e não é a primeira carga, mostra o brinde
                if (ultimoTotal !== null && novoTotal > ultimoTotal) {
                    showNotification();
                }
                ultimoTotal = novoTotal;
                document.getElementById('counter').innerText = novoTotal;
                
                // Fetch Last 7 Days
                const labels = [];
                const promises = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    labels.push(d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }));
                    promises.push(
                        fetch('https://abacus.jasoncameron.dev/get/daianeborcath/outono_' + dateStr)
                            .then(r => r.json())
                            .then(data => data.value || 0)
                            .catch(() => 0)
                    );
                }
                
                const dataCounts = await Promise.all(promises);
                
                // Update Today's value
                document.getElementById('counter-today').innerText = dataCounts[dataCounts.length - 1];

                // Render Chart
                const ctx = document.getElementById('dailyChart').getContext('2d');
                if (myChart) {
                    myChart.destroy();
                }
                
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Visitas Diárias',
                            data: dataCounts,
                            borderColor: '#b35a44',
                            backgroundColor: 'rgba(179, 90, 68, 0.1)',
                            borderWidth: 2,
                            pointBackgroundColor: '#b35a44',
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: isAuto ? false : { duration: 1000 },
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { precision: 0, color: '#9ca3af' },
                                border: { display: false },
                                grid: { color: '#f3f4f6' }
                            },
                            x: {
                                ticks: { color: '#9ca3af', font: { size: 10 } },
                                border: { display: false },
                                grid: { display: false }
                            }
                        }
                    }
                });

            } catch(e) {
                console.error(e);
            }
            if(!isAuto) {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
        
        // Carrega ao abrir a tela
        carregarMetricas();

        // Monitoramento Automático a cada 15 segundos
        setInterval(() => {
            carregarMetricas(true);
        }, 15000);
    </script>
</body>
</html>
