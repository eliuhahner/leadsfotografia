<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métricas | Rua do Outono</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: #333333;
        }
        h1, h2, .serif { font-family: 'Playfair Display', serif; }
        .accent-color { color: #b35a44; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center p-6 gap-6">
    <div class="bg-white p-10 rounded-xl shadow-xl max-w-lg w-full text-center border border-gray-100">
        <p class="serif italic text-sm tracking-widest uppercase opacity-70 mb-8">Painel de Métricas</p>
        
        <div class="flex justify-between items-end mb-8 border-b border-gray-100 pb-8">
            <div class="text-left">
                <h2 class="text-lg font-light text-gray-500 mb-1">Total de Visitantes</h2>
                <div class="text-6xl font-bold accent-color serif" id="counter">...</div>
            </div>
            <div class="text-right">
                <h2 class="text-sm font-light text-gray-500 mb-1">Hoje</h2>
                <div class="text-3xl font-bold text-gray-800" id="counter-today">...</div>
            </div>
        </div>
        
        <div class="mb-8 relative h-48 w-full">
            <canvas id="dailyChart"></canvas>
        </div>
        
        <button onclick="carregarMetricas()" id="btn-atualizar" class="w-full bg-stone-100 text-stone-600 hover:bg-stone-200 py-3 rounded-md text-sm tracking-wide transition-all duration-300 flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Atualizar Agora
        </button>
        <p class="text-[10px] opacity-40 mt-6">Acessar essa página não afeta a contagem de visitantes reais.</p>
    </div>

    <script>
        let myChart = null;

        async function carregarMetricas() {
            const btn = document.getElementById('btn-atualizar');
            btn.disabled = true;
            btn.style.opacity = '0.5';
            
            try {
                // Fetch Total
                const resTotal = await fetch('https://abacus.jasoncameron.dev/get/daianeborcath/outono');
                const dataTotal = await resTotal.json();
                document.getElementById('counter').innerText = dataTotal.value || 0;
                
                // Fetch Last 7 Days
                const labels = [];
                const promises = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    labels.push(d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }));
                    promises.push(
                        fetch('https://abacus.jasoncameron.dev/get/daianeborcath/outono_' + dateStr)
                            .then(r => r.json())
                            .then(data => data.value || 0)
                            .catch(() => 0)
                    );
                }
                
                const dataCounts = await Promise.all(promises);
                
                // Update Today's value
                document.getElementById('counter-today').innerText = dataCounts[dataCounts.length - 1];

                // Render Chart
                const ctx = document.getElementById('dailyChart').getContext('2d');
                if (myChart) {
                    myChart.destroy();
                }
                
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Visitas Diárias',
                            data: dataCounts,
                            borderColor: '#b35a44',
                            backgroundColor: 'rgba(179, 90, 68, 0.1)',
                            borderWidth: 2,
                            pointBackgroundColor: '#b35a44',
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { precision: 0, color: '#9ca3af' },
                                border: { display: false },
                                grid: { color: '#f3f4f6' }
                            },
                            x: {
                                ticks: { color: '#9ca3af', font: { size: 10 } },
                                border: { display: false },
                                grid: { display: false }
                            }
                        }
                    }
                });

            } catch(e) {
                console.error(e);
            }
            btn.disabled = false;
            btn.style.opacity = '1';
        }
        
        // Carrega ao abrir a tela
        carregarMetricas();
    </script>
</body>
</html>
