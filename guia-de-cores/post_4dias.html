<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Faltam 4 dias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --white: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #E5E5E5;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .post {
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(30,20,10,0.30) 0%,
                rgba(30,20,10,0.10) 30%,
                rgba(30,20,10,0.15) 50%,
                rgba(25,18,8,0.60) 75%,
                rgba(18,12,5,0.88) 100%
            );
        }
        .brand-mark {
            position: absolute;
            bottom: 36px;
            right: 48px;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 400;
            color: rgba(255,255,255,0.35);
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
        }
        .content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 72px 140px;
            text-align: center;
            z-index: 10;
        }
        .days-number {
            font-family: 'Playfair Display', serif;
            font-size: 140px;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            text-shadow: 0 2px 40px rgba(0,0,0,0.5);
            margin-bottom: 8px;
        }
        .days-label {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 300;
            color: rgba(255,255,255,0.6);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 600;
            color: var(--white);
            line-height: 1.3;
            text-shadow: 0 2px 24px rgba(0,0,0,0.35);
            margin-bottom: 20px;
        }
        .urgency-badge {
            display: inline-block;
            padding: 14px 36px;
            border: 1px solid var(--gold);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="post" id="post-4dias">
        <img class="bg-image" src="IMG_7529.jpg" alt="Duas mulheres na cama sorrindo">
        <div class="overlay"></div>
        <div class="content">
            <p class="days-number">4</p>
            <p class="days-label">dias</p>
            <p class="headline">Não deixe sua mãe<br>sem presente</p>
            <div class="urgency-badge">Me chama no direct</div>
        </div>
        <span class="brand-mark">Daiane Borcath</span>
    </div>
</body>
</html>
