<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Bastidores - Daiane Borcath Fotografia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #E5E5E5;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .post {
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                transparent 0%,
                transparent 35%,
                rgba(0,0,0,0.12) 55%,
                rgba(0,0,0,0.45) 72%,
                rgba(0,0,0,0.72) 100%
            );
        }

        .brand-mark {
            position: absolute;
            bottom: 36px;
            right: 48px;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 400;
            color: rgba(255,255,255,0.35);
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
        }

        .date-badge {
            position: absolute;
            top: 40px;
            left: 48px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 400;
            color: rgba(255,255,255,0.50);
            letter-spacing: 2px;
            z-index: 10;
        }

        .gold-line {
            width: 48px;
            height: 1px;
            background: var(--gold);
            opacity: 0.85;
        }

        .content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 72px 130px;
            z-index: 10;
        }

        .gold-line-left {
            margin-bottom: 28px;
        }

        .tag {
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 600;
            color: var(--white);
            line-height: 1.18;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 24px rgba(0,0,0,0.35);
            margin-bottom: 24px;
        }

        .body-text {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 300;
            color: rgba(255,255,255,0.70);
            line-height: 1.55;
            text-shadow: 0 1px 12px rgba(0,0,0,0.25);
        }

        .body-text em {
            font-style: italic;
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="post" id="post-bastidores">
        <img class="bg-image" src="IMG_7579.jpg" alt="Bastidores do ensaio">
        <div class="overlay"></div>
        <span class="date-badge">08 / 04</span>
        <div class="content">
            <span class="tag">Bastidores</span>
            <div class="gold-line gold-line-left"></div>
            <p class="headline">O que acontece antes do clique</p>
            <p class="body-text">Cada foto nasce de um momento de conexo. <em>Eu preparo o cenrio, mas  o amor que faz a mgica.</em></p>
        </div>
        <span class="brand-mark">Daiane Borcath</span>
    </div>
</body>
</html>
