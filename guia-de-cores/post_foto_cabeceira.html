<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - A foto que toda mãe guarda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --white: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #E5E5E5;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .post {
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                transparent 0%,
                transparent 45%,
                rgba(0,0,0,0.20) 60%,
                rgba(0,0,0,0.55) 78%,
                rgba(0,0,0,0.80) 100%
            );
        }
        .gold-line {
            width: 48px;
            height: 1px;
            background: var(--gold);
            opacity: 0.85;
        }
        .brand-mark {
            position: absolute;
            bottom: 36px;
            right: 48px;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 400;
            color: rgba(255,255,255,0.35);
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
        }
        .content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 72px 130px;
            z-index: 10;
        }
        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 46px;
            font-weight: 600;
            color: var(--white);
            line-height: 1.2;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 24px rgba(0,0,0,0.35);
            margin-bottom: 16px;
        }
        .subtext {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 400;
            font-style: italic;
            color: rgba(255,255,255,0.8);
            line-height: 1.4;
            text-shadow: 0 2px 24px rgba(0,0,0,0.35);
        }
    </style>
</head>
<body>
    <div class="post" id="post-foto-cabeceira">
        <img class="bg-image" src="IMG_7491.jpg" alt="Mulher beijando a cabeça do menino">
        <div class="overlay"></div>
        <div class="content">
            <div class="gold-line" style="margin-bottom: 28px;"></div>
            <p class="headline">A foto que toda mãe<br>guarda na cabeceira</p>
            <p class="subtext">Não é a mais perfeita. É a mais real.</p>
        </div>
        <span class="brand-mark">Daiane Borcath</span>
    </div>
</body>
</html>
