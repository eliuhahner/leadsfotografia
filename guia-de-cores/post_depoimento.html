<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Depoimento - Daiane Borcath Fotografia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #E5E5E5;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .post {
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .overlay-strong {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(0,0,0,0.25) 0%,
                rgba(0,0,0,0.08) 30%,
                rgba(0,0,0,0.15) 50%,
                rgba(0,0,0,0.55) 72%,
                rgba(0,0,0,0.80) 100%
            );
        }

        .brand-mark {
            position: absolute;
            bottom: 36px;
            right: 48px;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 400;
            color: rgba(255,255,255,0.35);
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
        }

        .date-badge {
            position: absolute;
            top: 40px;
            left: 48px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 400;
            color: rgba(255,255,255,0.50);
            letter-spacing: 2px;
            z-index: 10;
        }

        .gold-line {
            width: 48px;
            height: 1px;
            background: var(--gold);
            opacity: 0.85;
        }

        .content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 72px 130px;
            z-index: 10;
        }

        .content-center {
            text-align: center;
        }

        .gold-line-center {
            margin: 0 auto 32px;
        }

        .quote-mark {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            color: var(--gold);
            opacity: 0.6;
            line-height: 1;
            margin-bottom: 8px;
        }

        .testimonial {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 400;
            font-style: italic;
            color: var(--white);
            line-height: 1.4;
            text-shadow: 0 2px 24px rgba(0,0,0,0.35);
            margin-bottom: 32px;
        }

        .testimonial strong {
            color: var(--gold);
            font-weight: 600;
        }

        .client-name {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.55);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="post" id="post-depoimento">
        <img class="bg-image" src="IMG_7529.jpg" alt="Ensaio Dia das Mães">
        <div class="overlay-strong"></div>
        <span class="date-badge">15 / 04</span>
        <div class="content content-center">
            <div class="quote-mark">"</div>
            <div class="gold-line gold-line-center"></div>
            <p class="testimonial">As fotos ficaram <strong>lindas demais</strong>. Minha mãe chorou quando viu. Melhor presente que já dei.</p>
            <p class="client-name">Camila R. — Ensaio Dia das Mães 2025</p>
        </div>
        <span class="brand-mark">Daiane Borcath</span>
    </div>
</body>
</html>
