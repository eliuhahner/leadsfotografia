<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Cores Premium - Rua do Outono</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --white: #FFFFFF;
            --glass-border: rgba(255, 255, 255, 0.2);
            --dark-glass: rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            position: relative;
            background: #121212;
            display: flex;
            flex-direction: column;
            padding: 60px 40px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        /* Ambient background */
        .main-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 0% 0%, rgba(179, 92, 68, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(227, 180, 72, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 8vw, 64px);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 700;
            color: #fff;
        }

        .header p {
            font-size: clamp(14px, 4vw, 24px);
            font-weight: 300;
            letter-spacing: 6px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            position: relative;
            z-index: 10;
            flex: 1;
        }

        .card {
            background: var(--dark-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s ease;
        }

        .card-image-wrapper {
            aspect-ratio: 4/5;
            overflow: hidden;
            position: relative;
            margin: 20px;
            border-radius: 25px;
            background: #222;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 0 30px 40px;
            text-align: center;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .card-subtitle {
            font-size: 15px;
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .color-palette {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 5px;
        }

        .color-dot {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .color-dot::after {
            content: attr(data-label);
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            opacity: 0.7;
            font-weight: 600;
        }

        /* Specific Colors */
        .bg-navy { background-color: #1D2751; }
        .bg-moss { background-color: #4A5D23; }
        .bg-denim { background-color: #2F3E46; }
        .bg-offwhite { background-color: #F5F5F5; }
        .bg-creme { background-color: #E3D9C6; }
        .bg-beige { background-color: #C5A07E; }
        .bg-wine { background-color: #631E26; }
        .bg-mustard { background-color: #C69320; }
        .bg-terracotta { background-color: #9B4731; }

        .watermark {
            margin-top: 60px;
            margin-bottom: 40px;
            text-align: center;
            font-size: 14px;
            letter-spacing: 5px;
            opacity: 0.3;
            text-transform: uppercase;
            font-weight: 300;
            position: relative;
            z-index: 10;
        }

        @media (max-width: 600px) {
            .main-container {
                padding: 40px 20px;
            }
            .bento-grid {
                grid-template-columns: 1fr;
            }
            .color-palette {
                gap: 25px;
            }
            .color-dot {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="header">
            <h1>Guia de Cores</h1>
            <p>Rua do Outono • 2026</p>
        </header>

        <div class="bento-grid">
            <!-- PALETA DE CONTRASTE -->
            <div class="card">
                <div class="card-image-wrapper">
                    <img src="couple_autumn_contrast_1777676573490.png" alt="Paleta de Contraste">
                </div>
                <div class="card-content">
                    <h2 class="card-title">Contraste</h2>
                    <p class="card-subtitle">Destaque absoluto em relação ao cenário</p>
                    <div class="color-palette">
                        <div class="color-dot bg-navy" data-label="Navy"></div>
                        <div class="color-dot bg-moss" data-label="Musgo"></div>
                        <div class="color-dot bg-denim" data-label="Jeans"></div>
                    </div>
                </div>
            </div>

            <!-- NEUTROS & ILUMINADOS -->
            <div class="card">
                <div class="card-image-wrapper">
                    <img src="mother_child_autumn_neutrals_1777676587526.png" alt="Neutros & Iluminados">
                </div>
                <div class="card-content">
                    <h2 class="card-title">Neutros</h2>
                    <p class="card-subtitle">O clássico atemporal que ilumina o olhar</p>
                    <div class="color-palette">
                        <div class="color-dot bg-offwhite" data-label="Off-White"></div>
                        <div class="color-dot bg-creme" data-label="Creme"></div>
                        <div class="color-dot bg-beige" data-label="Bege"></div>
                    </div>
                </div>
            </div>

            <!-- TONS TERROSOS -->
            <div class="card">
                <div class="card-image-wrapper">
                    <img src="family_autumn_earth_tones_1777676603587.png" alt="Tons Terrosos">
                </div>
                <div class="card-content">
                    <h2 class="card-title">Terrosos</h2>
                    <p class="card-subtitle">Harmonia orgânica com as cores da estação</p>
                    <div class="color-palette">
                        <div class="color-dot bg-wine" data-label="Vinho"></div>
                        <div class="color-dot bg-mustard" data-label="Mostarda"></div>
                        <div class="color-dot bg-terracotta" data-label="Terracota"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="watermark">Daiane Borcath Fotografia</div>
    </div>
</body>
</html>
